<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Suzi Word Study</title>

<style>

body{
background:#f3f6fb;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
width:380px;
padding:40px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
text-align:center;
}

#word{
font-size:36px;
margin-bottom:20px;
animation:fade 0.3s;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

button{
background:#5a7cff;
border:none;
color:white;
padding:10px 18px;
border-radius:10px;
margin:5px;
font-size:14px;
cursor:pointer;
}

button:hover{
background:#4768e6;
}

input{
width:100%;
padding:12px;
margin-top:15px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

#result{
margin-top:15px;
font-weight:bold;
}

.stats{
margin-top:20px;
font-size:14px;
color:#555;
}

ul{
text-align:left;
max-height:120px;
overflow:auto;
padding-left:20px;
}

#heartContainer{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.heart{
position:absolute;
font-size:30px;
animation:float 2s linear forwards;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-200px);opacity:0;}
}

</style>
</head>

<body>

<div class="container">

<h2 id="word">Loading...</h2>

<button onclick="speakWord()">🔊 발음</button>
<button onclick="toggleMode()">뜻 가리기</button>

<input type="text" id="answer" placeholder="뜻 입력">

<button onclick="checkAnswer()">확인</button>

<p id="result"></p>

<div class="stats">
오늘 공부한 단어: <span id="studyCount">0</span><br>
정답률: <span id="accuracy">0</span>%
</div>

<h3>틀린 단어</h3>
<ul id="wrongWords"></ul>

</div>

<div id="heartContainer"></div>

<script>

let words=[];
let wrongWords=[];
let index=0;
let current=null;
let hideMode=false;

let totalAnswered=0;
let correctCount=0;

fetch("words.json")
.then(res=>res.json())
.then(data=>{
words=shuffle(data);
nextWord();
});

function shuffle(array){
for(let i=array.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

function nextWord(){

if(index>=words.length){

if(wrongWords.length===0){
index=0;
words=shuffle(words);
}else{
words=shuffle(wrongWords);
wrongWords=[];
index=0;
}

}

current=words[index];

if(hideMode){
document.getElementById("word").innerText="🔊 듣고 맞추기";
speakWord();
}else{
document.getElementById("word").innerText=current.word;
}

document.getElementById("answer").value="";
document.getElementById("result").innerText="";

index++;

}

function checkAnswer(){

if(!current) return;

const input=document.getElementById("answer").value.trim();

totalAnswered++;

if(input===current.meaning){

correctCount++;

document.getElementById("result").innerText="정답!";
createHearts();

}else{

document.getElementById("result").innerText="틀림! 정답: "+current.meaning;

wrongWords.push(current);
addWrongWord(current);

}

updateStats();

setTimeout(nextWord,800);

}

function updateStats(){

document.getElementById("studyCount").innerText=totalAnswered;

let accuracy=0;

if(totalAnswered>0){
accuracy=Math.round((correctCount/totalAnswered)*100);
}

document.getElementById("accuracy").innerText=accuracy;

}

function addWrongWord(word){

const li=document.createElement("li");
li.innerText=word.word+" - "+word.meaning;

document.getElementById("wrongWords").appendChild(li);

}

function speakWord(){

if(!current) return;

const speech=new SpeechSynthesisUtterance(current.word);
speech.lang="en-US";
speech.rate=0.75;

speechSynthesis.speak(speech);

}

function toggleMode(){

hideMode=!hideMode;

nextWord();

}

function createHearts(){

const container=document.getElementById("heartContainer");

for(let i=0;i<10;i++){

const heart=document.createElement("div");
heart.className="heart";
heart.innerText="❤️";

heart.style.left=Math.random()*100+"%";
heart.style.top="70%";

container.appendChild(heart);

setTimeout(()=>{
heart.remove();
},2000);

}

}

document.getElementById("answer")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
checkAnswer();
}

});

</script>

</body>
</html>
